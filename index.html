<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yinzer McMullet's Mac Bid Checker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px;
  }
  .card {
    background: #141414;
    border: 2px solid #FFB81C;
    border-radius: 12px;
    padding: 32px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 8px 32px rgba(255,184,28,.15);
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 6px;
    color: #FFB81C;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .subtitle {
    text-align: center;
    font-size: .8rem;
    color: #666;
    margin-bottom: 24px;
    letter-spacing: .5px;
  }
  label {
    display: block;
    font-size: .85rem;
    color: #999;
    margin-bottom: 6px;
  }
  .input-group { margin-bottom: 20px; position: relative; }
  .input-group .dollar {
    position: absolute;
    left: 14px;
    top: 38px;
    font-size: 1.1rem;
    color: #666;
  }
  input, select {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #333;
    border-radius: 8px;
    background: #1a1a1a;
    color: #fff;
    font-size: 16px;
    outline: none;
    transition: border-color .2s;
    -webkit-appearance: none;
  }
  optgroup { color: #999; font-style: normal; }
  option { color: #fff; background: #1a1a1a; }
  input:focus, select:focus {
    border-color: #FFB81C;
  }
  .dollar-input { padding-left: 30px; }
  .custom-tax { margin-top: 8px; display: none; }
  .custom-tax.show { display: block; }
  .breakdown {
    margin-top: 24px;
    border-top: 1px solid #333;
    padding-top: 16px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: .95rem;
  }
  .row.subtotal {
    border-top: 1px solid #333;
    margin-top: 4px;
    padding-top: 12px;
    color: #999;
  }
  .row.total {
    border-top: 2px solid #FFB81C;
    margin-top: 8px;
    padding-top: 14px;
    font-size: 1.25rem;
    font-weight: 700;
    color: #FFB81C;
  }
  .row .label { color: #999; }
  .row.total .label { color: #FFB81C; }
  .markup-note {
    text-align: center;
    margin-top: 16px;
    font-size: .85rem;
    color: #999;
  }
  .markup-note span { color: #ff6b6b; font-weight: 600; }
  .checkbox-group {
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .checkbox-group input[type="checkbox"] {
    -webkit-appearance: checkbox;
    appearance: checkbox;
    width: 20px;
    height: 20px;
    accent-color: #FFB81C;
    cursor: pointer;
  }
  .checkbox-group label {
    display: inline;
    margin-bottom: 0;
    cursor: pointer;
  }
  .default-btn {
    display: block;
    width: 100%;
    margin-top: 8px;
    padding: 8px;
    border: 1px solid #333;
    border-radius: 6px;
    background: transparent;
    color: #666;
    font-size: .75rem;
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .default-btn:hover, .default-btn:active { border-color: #FFB81C; color: #FFB81C; }
  .default-btn.saved { border-color: #34d399; color: #34d399; }
  .clear-btn {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    border: 2px solid #333;
    border-radius: 8px;
    background: #1a1a1a;
    color: #999;
    font-size: .9rem;
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .clear-btn:hover, .clear-btn:active { border-color: #FFB81C; color: #FFB81C; }
  .savings {
    margin-top: 16px;
    border-top: 1px solid #333;
    padding-top: 16px;
    display: none;
  }
  .savings.show { display: block; }
  .savings-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: .95rem;
  }
  .savings-row .label { color: #999; }
  .savings-row.good .val { color: #34d399; font-weight: 700; }
  .savings-row.bad .val { color: #ff6b6b; font-weight: 700; }
  .savings-header {
    font-size: .8rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .feedback {
    text-align: center;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid #333;
    font-size: .8rem;
  }
  .feedback a { color: #FFB81C; text-decoration: none; }
  .feedback a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <img src="logo.png" alt="Yinzer McMullet" style="display:block;margin:0 auto 12px;width:100px;height:auto">
  <h1>Yinzer McMullet's<br>Mac Bid Checker</h1>

  <div class="input-group">
    <label for="bid">Your Bid Amount</label>
    <span class="dollar">$</span>
    <input type="text" inputmode="decimal" id="bid" class="dollar-input" placeholder="0.00" autofocus>
  </div>

  <div class="input-group">
    <label for="retail">Retail Price (optional)</label>
    <span class="dollar">$</span>
    <input type="text" inputmode="decimal" id="retail" class="dollar-input" placeholder="0.00">
  </div>

  <div class="input-group">
    <label for="macbucks">Mac Bucks (optional)</label>
    <span class="dollar">$</span>
    <input type="text" inputmode="decimal" id="macbucks" class="dollar-input" placeholder="0.00">
  </div>

  <div class="checkbox-group">
    <input type="checkbox" id="transferFee">
    <label for="transferFee">Transfer Fee ($10)</label>
  </div>

  <div class="input-group">
    <label for="taxSelect">Location</label>
    <select id="taxSelect">
      <optgroup label="Arizona">
        <option value="8.3" data-loc="mesa-az">Mesa &mdash; 8.30%</option>
        <option value="9.1" data-loc="phoenix-az">Phoenix &mdash; 9.10%</option>
      </optgroup>
      <optgroup label="Colorado">
        <option value="8.2" data-loc="cosprings-co">Colorado Springs &mdash; 8.20%</option>
      </optgroup>
      <optgroup label="Georgia">
        <option value="8" data-loc="macon-ga">Macon &mdash; 8.00%</option>
      </optgroup>
      <optgroup label="Iowa">
        <option value="7" data-loc="davenport-ia">Davenport &mdash; 7.00%</option>
      </optgroup>
      <optgroup label="Nevada">
        <option value="8.375" data-loc="henderson-nv">Henderson &mdash; 8.375%</option>
        <option value="8.375" data-loc="nlv-nv">North Las Vegas &mdash; 8.375%</option>
      </optgroup>
      <optgroup label="North Carolina">
        <option value="7" data-loc="gastonia-nc">Gastonia &mdash; 7.00%</option>
      </optgroup>
      <optgroup label="Ohio">
        <option value="6.5" data-loc="canton-oh">Canton &mdash; 6.50%</option>
        <option value="6.5" data-loc="hamilton-oh">Hamilton &mdash; 6.50%</option>
        <option value="6.75" data-loc="akron-oh">Akron &mdash; 6.75%</option>
        <option value="6.75" data-loc="warren-oh">Warren &mdash; 6.75%</option>
        <option value="7.5" data-loc="boardman-oh">Boardman &mdash; 7.50%</option>
      </optgroup>
      <optgroup label="Pennsylvania &mdash; Allegheny Co. (7%)">
        <option value="7" data-loc="mckees-pa">McKees Rocks</option>
        <option value="7" data-loc="robinson-pa">Robinson</option>
        <option value="7" data-loc="pittsburgh-mills-pa">Pittsburgh Mills (Tarentum)</option>
        <option value="7" data-loc="monroeville-pa">Monroeville</option>
      </optgroup>
      <optgroup label="Pennsylvania &mdash; Other Counties (6%)">
        <option value="6" data-loc="beaver-pa">Beaver Falls</option>
        <option value="6" data-loc="butler-pa">Butler</option>
        <option value="6" data-loc="washington-pa">Washington</option>
        <option value="6" data-loc="washington-bb-pa">Washington Big Box</option>
        <option value="6" data-loc="uniontown-pa">Uniontown</option>
      </optgroup>
      <optgroup label="South Carolina">
        <option value="7" data-loc="anderson-sc">Anderson &mdash; 7.00%</option>
        <option value="8" data-loc="cowpens-sc">Cowpens &mdash; 8.00%</option>
        <option value="7" data-loc="greenville-sc">Greenville &mdash; 7.00%</option>
        <option value="7" data-loc="rockhill-sc">Rock Hill &mdash; 7.00%</option>
      </optgroup>
      <optgroup label="Tennessee">
        <option value="9.75" data-loc="jackson-tn">Jackson &mdash; 9.75%</option>
      </optgroup>
      <optgroup label="Texas">
        <option value="8.25" data-loc="schertz-tx">Schertz (San Antonio) &mdash; 8.25%</option>
        <option value="8.25" data-loc="sanantonio-tx">San Antonio &mdash; 8.25%</option>
        <option value="8.25" data-loc="elpaso-tx">El Paso &mdash; 8.25%</option>
      </optgroup>
      <optgroup label="Other">
        <option value="custom" data-loc="custom">Custom...</option>
      </optgroup>
    </select>
    <input type="text" inputmode="decimal" id="customTax" class="custom-tax" placeholder="Enter tax %">
    <button class="default-btn" id="setDefaultBtn">Set as my default location</button>
  </div>

  <div class="breakdown">
    <div class="row"><span class="label">Winning Bid</span><span id="outBid">$0.00</span></div>
    <div class="row"><span class="label">Buyer's Premium (15%)</span><span id="outPremium">$0.00</span></div>
    <div class="row"><span class="label">Lot Fee</span><span id="outLot">$0.00</span></div>
    <div class="row" id="transferRow" style="display:none"><span class="label">Transfer Fee</span><span id="outTransfer">$10.00</span></div>
    <div class="row subtotal"><span class="label">Subtotal</span><span id="outSubtotal">$0.00</span></div>
    <div class="row"><span class="label">Sales Tax (<span id="taxLabel">6</span>%)</span><span id="outTax">$0.00</span></div>
    <div class="row total"><span class="label">Total</span><span id="outTotal">$0.00</span></div>
    <div class="macbucks-section" id="macbucksSection" style="display:none">
      <div class="row" style="margin-top:4px"><span class="label">Mac Bucks</span><span id="outMacbucks" style="color:#34d399">-$0.00</span></div>
      <div class="row total" style="border-color:#34d399"><span class="label" style="color:#34d399">You Pay</span><span id="outFinal" style="color:#34d399">$0.00</span></div>
    </div>
  </div>

  <div class="markup-note" id="markupNote"></div>

  <button class="clear-btn" id="clearBtn">Clear</button>

  <div class="savings" id="savingsSection">
    <div class="savings-header">vs. Retail</div>
    <div class="savings-row" id="savingsRow"><span class="label">Retail Price</span><span class="val" id="outRetail">$0.00</span></div>
    <div class="savings-row" id="savingsDollarRow"><span class="label" id="savingsDollarLabel">You Save</span><span class="val" id="outSavingsDollar">$0.00</span></div>
    <div class="savings-row" id="savingsPctRow"><span class="label" id="savingsPctLabel">Discount</span><span class="val" id="outSavingsPct">0%</span></div>
  </div>

  <div class="feedback">Suggestions? <a href="https://mail.google.com/mail/?view=cm&fs=1&to=yinzermcmullet@gmail.com&su=MacBid+Calculator+Suggestion" target="_blank">yinzermcmullet@gmail.com</a></div>
</div>

<script>
  const bidEl = document.getElementById('bid');
  const retailEl = document.getElementById('retail');
  const macbucksEl = document.getElementById('macbucks');
  const transferEl = document.getElementById('transferFee');
  const taxSelectEl = document.getElementById('taxSelect');
  const customTaxEl = document.getElementById('customTax');
  const LOT_FEE = 3.00;
  const PREMIUM_RATE = 0.15;

  function fmt(n) {
    return '$' + n.toFixed(2);
  }

  function getTaxRate() {
    if (taxSelectEl.value === 'custom') {
      return (parseFloat(customTaxEl.value) || 0) / 100;
    }
    return parseFloat(taxSelectEl.value) / 100;
  }

  function calculate() {
    const bid = parseFloat(bidEl.value) || 0;
    const retail = parseFloat(retailEl.value) || 0;
    const mb = parseFloat(macbucksEl.value) || 0;
    const taxRate = getTaxRate();
    const transfer = transferEl.checked ? 10 : 0;
    const premium = bid * PREMIUM_RATE;
    const subtotal = bid + premium + LOT_FEE + transfer;
    const tax = subtotal * taxRate;
    const total = Math.max(0, subtotal + tax - mb);

    document.getElementById('outBid').textContent = fmt(bid);
    document.getElementById('outPremium').textContent = fmt(premium);
    document.getElementById('outLot').textContent = fmt(LOT_FEE);
    document.getElementById('transferRow').style.display = transfer ? '' : 'none';
    document.getElementById('outSubtotal').textContent = fmt(subtotal);
    document.getElementById('taxLabel').textContent = (taxRate * 100).toFixed(1).replace(/\.0$/, '');
    document.getElementById('outTax').textContent = fmt(tax);
    var totalBeforeMb = subtotal + tax;
    document.getElementById('outTotal').textContent = fmt(totalBeforeMb);
    var mbSection = document.getElementById('macbucksSection');
    if (mb > 0) {
      mbSection.style.display = '';
      document.getElementById('outMacbucks').textContent = '-' + fmt(mb);
      document.getElementById('outFinal').textContent = fmt(total);
    } else {
      mbSection.style.display = 'none';
    }

    const note = document.getElementById('markupNote');
    if (bid > 0 && total > bid) {
      const markup = ((total - bid) / bid * 100).toFixed(1);
      note.innerHTML = 'You pay <span style="color:#ff6b6b">' + markup + '% more</span> than your bid';
    } else if (bid > 0 && total < bid) {
      const savings = ((bid - total) / bid * 100).toFixed(1);
      note.innerHTML = 'You pay <span style="color:#34d399">' + savings + '% less</span> than your bid';
    } else {
      note.innerHTML = '';
    }

    const savingsSection = document.getElementById('savingsSection');
    if (retail > 0 && bid > 0) {
      savingsSection.classList.add('show');
      const diff = retail - total;
      const pct = (diff / retail * 100);
      document.getElementById('outRetail').textContent = fmt(retail);

      const dollarRow = document.getElementById('savingsDollarRow');
      const pctRow = document.getElementById('savingsPctRow');

      if (diff >= 0) {
        document.getElementById('savingsDollarLabel').textContent = 'You Save';
        document.getElementById('outSavingsDollar').textContent = fmt(diff);
        dollarRow.className = 'savings-row good';
        document.getElementById('savingsPctLabel').textContent = 'Discount';
        document.getElementById('outSavingsPct').textContent = pct.toFixed(1) + '% off';
        pctRow.className = 'savings-row good';
      } else {
        document.getElementById('savingsDollarLabel').textContent = 'You Overpay';
        document.getElementById('outSavingsDollar').textContent = fmt(Math.abs(diff));
        dollarRow.className = 'savings-row bad';
        document.getElementById('savingsPctLabel').textContent = 'Over Retail';
        document.getElementById('outSavingsPct').textContent = Math.abs(pct).toFixed(1) + '% more';
        pctRow.className = 'savings-row bad';
      }
    } else {
      savingsSection.classList.remove('show');
    }
  }

  var defaultBtn = document.getElementById('setDefaultBtn');
  var DEFAULT_LOC = 'butler-pa';

  function getDefaultLoc() {
    try { return localStorage.getItem('macbid-default-loc') || DEFAULT_LOC; } catch(e) { return DEFAULT_LOC; }
  }

  function setLocationByLoc(loc) {
    var opts = taxSelectEl.options;
    for (var i = 0; i < opts.length; i++) {
      if (opts[i].getAttribute('data-loc') === loc) {
        taxSelectEl.selectedIndex = i;
        return true;
      }
    }
    return false;
  }

  function updateDefaultBtn() {
    var current = taxSelectEl.options[taxSelectEl.selectedIndex];
    var loc = current ? current.getAttribute('data-loc') : '';
    var saved = getDefaultLoc();
    if (loc === saved) {
      defaultBtn.textContent = 'This is your default location';
      defaultBtn.classList.add('saved');
    } else {
      defaultBtn.textContent = 'Set as my default location';
      defaultBtn.classList.remove('saved');
    }
  }

  defaultBtn.addEventListener('click', function() {
    var current = taxSelectEl.options[taxSelectEl.selectedIndex];
    if (current) {
      try { localStorage.setItem('macbid-default-loc', current.getAttribute('data-loc')); } catch(e) {}
      updateDefaultBtn();
    }
  });

  taxSelectEl.addEventListener('change', function() {
    customTaxEl.classList.toggle('show', this.value === 'custom');
    if (this.value === 'custom') customTaxEl.focus();
    updateDefaultBtn();
    calculate();
  });

  document.getElementById('clearBtn').addEventListener('click', function() {
    bidEl.value = '';
    retailEl.value = '';
    macbucksEl.value = '';
    transferEl.checked = false;
    setLocationByLoc(getDefaultLoc());
    customTaxEl.value = '';
    customTaxEl.classList.remove('show');
    updateDefaultBtn();
    calculate();
    bidEl.focus();
  });

  transferEl.addEventListener('change', calculate);
  ['input', 'change', 'keyup', 'blur'].forEach(function(evt) {
    bidEl.addEventListener(evt, calculate);
    retailEl.addEventListener(evt, calculate);
    macbucksEl.addEventListener(evt, calculate);
    customTaxEl.addEventListener(evt, calculate);
  });

  // On page load: set saved default location
  setLocationByLoc(getDefaultLoc());
  updateDefaultBtn();
  calculate();
</script>
</body>
</html>
